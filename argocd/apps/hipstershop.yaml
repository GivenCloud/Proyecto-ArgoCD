apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hipstershop
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.io
spec:
  project: hipstershop
  source:
    repoURL: https://github.com/GivenCloud/Proyecto-ArgoCD.git
    targetRevision: main
    path: apps/HipsterShop/hipstershop-demo/helm
  destination:
    server: https://kubernetes.default.svc
    namespace: hipstershop
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
