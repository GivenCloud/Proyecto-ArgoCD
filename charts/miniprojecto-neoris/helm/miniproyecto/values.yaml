web:
  replicas: 1
  image: ghcr.io/givencloud/miniproyecto_neoris:latest
  imagePullPolicy: Always
  port: 3000
  nodePort: 30080
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"

db:
  image: postgres:15-alpine
  port: 5432
  host: postgres-service
  name: appdb
  user: appuser
  password: apppassword
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

redis:
  image: redis:7-alpine
  port: 6379
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "200m"
      memory: "128Mi"

